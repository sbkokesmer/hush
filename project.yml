name: Hush
options:
  bundleIdPrefix: com.hush
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Hush:
    type: application
    platform: iOS
    sources:
      - path: Hush
        excludes:
          - "Resources/Info.plist"
    resources:
      - Hush/Resources/Assets.xcassets
      - Hush/Resources/blocker-rules.json
    info:
      path: Hush/Resources/Info.plist
      properties:
        CFBundleDisplayName: Hush
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: AccentColor
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Hush ziyaretlerinizi gizli tutmak için Face ID kullanır."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hush.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Hush/Resources/Info.plist
